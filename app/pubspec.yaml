name: sereno
description: Sereno — cliente Flutter do piloto de neuromodulação (ferramenta complementar).
publish_to: "none"
version: 0.1.0+1
environment:
  sdk: ">=3.3.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:       # i18n (delegates Global* p/ pt/en) — ver lib/l10n
    sdk: flutter
  http: ^1.2.0
  flutter_secure_storage: ^9.2.2
  just_audio: ^0.9.40          # reprodução (bit-a-bit; atrás da porta AudioPlayerPort)
  path_provider: ^2.1.3        # diretório da fila de telemetria offline
  crypto: ^3.0.3               # sha256 p/ verificar a fidelidade do áudio (ETag)
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
flutter:
  uses-material-design: true
  assets:
    # Texto integral do TCLE. GERADO de docs/tcle-rascunho.md por scripts/sync_tcle.py —
    # não editar à mão; o CI falha se o asset e o documento saírem de sincronia.
    - assets/tcle/tcle-pt.txt
  # Fontes da identidade (adicionar os arquivos .ttf em assets/fonts e descomentar):
  #   Fraunces (display), Inter (corpo), IBM Plex Mono (dados)
