openapi: 3.1.0
info:
  title: Sereno API
  version: "1.0.0"
  description: >
    API do piloto de neuromodulação não invasiva. Contrato é a fonte de verdade.
    Erros seguem problem+json (RFC 9457). O braço do estudo nunca é exposto:
    endpoints de participante recebem apenas um handle de protocolo neutro, e a
    exportação de pesquisa usa braço codificado (A/B).
servers:
  - url: https://api.sereno.example/v1
security:
  - bearerAuth: []
paths:
  /auth/token:
    post:
      summary: Autenticar e obter tokens
      description: >
        Login de staff por senha (argon2). MFA é obrigatório: se o 2º fator ainda não
        estiver ativo, a resposta traz `mfa_enrollment_required` + `enrollment_token`
        (não concede acesso pleno). Se estiver ativo, traz `mfa_required` + `mfa_token`.
      security: []
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginIn' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/TokenResponse' } } } }
        '401': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
        '429': { $ref: '#/components/responses/Problem' }
  /auth/refresh:
    post:
      summary: Renovar token de acesso
      security: []
      operationId: refreshToken
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/RefreshIn' } } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/TokenResponse' } } } }
        '401': { $ref: '#/components/responses/Problem' }
  /auth/logout:
    post:
      summary: Revogar o token atual (denylist por jti) — encerra a sessão
      operationId: logout
      description: >
        Revoga o token de acesso apresentado (adiciona seu `jti` à denylist até expirar);
        se um `refresh_token` for enviado, revoga também o seu `jti`. Requer autenticação.
      requestBody:
        required: false
        content: { application/json: { schema: { $ref: '#/components/schemas/LogoutIn' } } }
      responses:
        '200': { description: Sessão encerrada (token revogado) }
        '401': { $ref: '#/components/responses/Problem' }
  /auth/mfa/verify:
    post:
      summary: Verificar segundo fator (TOTP) — pesquisador/admin
      operationId: verifyMfa
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/MfaIn' } } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/TokenResponse' } } } }
        '401': { $ref: '#/components/responses/Problem' }
  /auth/participant/request-otp:
    post:
      summary: Solicitar código de uso único (OTP) — participante
      operationId: participantRequestOtp
      security: []
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/RequestOtpIn' } } }
      responses:
        '200': { description: "OK (resposta genérica, sem enumeração)" }
        '429': { $ref: '#/components/responses/Problem' }
  /auth/participant/verify-otp:
    post:
      summary: Verificar OTP e emitir token de participante
      operationId: participantVerifyOtp
      security: []
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/VerifyOtpIn' } } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/TokenResponse' } } } }
        '401': { $ref: '#/components/responses/Problem' }
  /diary:
    post:
      summary: Registrar entrada do diário de sono (um por dia)
      operationId: addDiaryEntry
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/DiaryIn' } } }
      responses:
        '201': { description: Registrado }
        '409': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
  /recommendations:
    post:
      summary: Recomendar protocolo por regras (participante)
      description: >
        Motor POR REGRAS, transparente e versionado, restrito à biblioteca validada.
        Os sinais de segurança (evento adverso recente, contraindicação) são resolvidos
        no SERVIDOR — o cliente não os informa. Devolve um handle NEUTRO, idêntico nos dois
        braços (nunca revela a condição). Cada chamada é registrada (recommendation_log) com
        `feature_vector` para ML futuro. ML nunca decide ao vivo.
      operationId: getRecommendation
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/RecommendationRequest' } } }
      responses:
        '201': { description: Recomendação gerada, content: { application/json: { schema: { $ref: '#/components/schemas/Recommendation' } } } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
  /recommendations/{rec_id}/accept:
    post:
      summary: Registrar aceite/recusa da própria recomendação (participante)
      description: >
        Fecha o loop do recomendador para o relatório de coerência. Decisão única
        (409 se já registrada); recomendação de outro participante retorna 404 (anti-IDOR).
      operationId: acceptRecommendation
      parameters:
        - { name: rec_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/AcceptRecommendationIn' } } }
      responses:
        '200': { description: Registrado, content: { application/json: { schema: { $ref: '#/components/schemas/AcceptRecommendationOut' } } } }
        '401': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
  /research/recommendation-coherence:
    get:
      summary: Coerência do recomendador (exploratório, cego)
      description: >
        Relatório CEGO (sem braço) sobre `recommendation_log`: alinhamento objetivo→banda
        e taxa de aceitação. Médias de relaxamento pendem de vínculo recomendação→sessão.
      operationId: getRecommendationCoherence
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/RecommendationCoherence' } } } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
  /participants/me/followup:
    post:
      summary: Enviar avaliação de seguimento (PSQI + GAD-7 + SUS + palpite de cegamento)
      operationId: submitFollowup
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/FollowupIn' } } }
      responses:
        '201': { description: Criado, content: { application/json: { schema: { $ref: '#/components/schemas/FollowupOut' } } } }
        '409': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
  /participants/me/consent:
    post:
      summary: Registrar consentimento (TCLE)
      operationId: recordConsent
      parameters: [ { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/ConsentIn' } } }
      responses:
        '201': { description: Criado, content: { application/json: { schema: { $ref: '#/components/schemas/ConsentOut' } } } }
        '409': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
  /participants/me/baseline:
    post:
      summary: Enviar avaliação de linha de base (PSQI + GAD-7)
      operationId: submitBaseline
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/BaselineIn' } } }
      responses:
        '201': { description: Criado, content: { application/json: { schema: { $ref: '#/components/schemas/ScoreOut' } } } }
        '422': { $ref: '#/components/responses/Problem' }
  /sessions:
    post:
      summary: Iniciar uma sessão
      operationId: startSession
      parameters: [ { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/SessionIn' } } }
      responses:
        '201': { description: Criado, content: { application/json: { schema: { $ref: '#/components/schemas/SessionOut' } } } }
        '422': { $ref: '#/components/responses/Problem' }
    get:
      summary: Listar sessões do participante
      operationId: listSessions
      parameters:
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/Cursor' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/SessionPage' } } } }
  /sessions/{id}/complete:
    post:
      summary: Encerrar a sessão (telemetria)
      operationId: completeSession
      parameters: [ { $ref: '#/components/parameters/PathId' } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/SessionCompleteIn' } } }
      responses:
        '200': { description: Encerrada }
        '404': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
  /sessions/{id}/survey:
    post:
      summary: Enviar micro-questionário pós-sessão
      operationId: submitSurvey
      parameters: [ { $ref: '#/components/parameters/PathId' } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/SurveyIn' } } }
      responses:
        '201': { description: Criado }
        '404': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
  /sessions/{id}/audio:
    get:
      summary: Baixar o áudio da sessão (bit-a-bit, sem revelar o braço)
      operationId: getSessionAudio
      description: >
        Transmite o WAV PCM sem perdas da PRÓPRIA sessão do participante autenticado.
        O protocolo (ativo/sham) foi resolvido no servidor e CONGELADO na sessão; nada
        é re-resolvido aqui e nenhum header/metadado revela a condição. Suporta Range
        para retomada. ETag = sha256 do corpo (integridade bit-a-bit) — distinto do
        content_hash, que é a identidade OPACA do protocolo. Cache-Control: private,
        no-store (o cliente não persiste o áudio em claro).
      parameters:
        - { $ref: '#/components/parameters/PathId' }
        - name: Range
          in: header
          required: false
          schema: { type: string }
          description: 'Faixa de bytes para retomada (ex.: bytes=0-1048575).'
      responses:
        '200':
          description: Áudio completo (WAV PCM 16-bit, estéreo)
          headers:
            ETag: { description: sha256 hex do corpo (bit-a-bit), schema: { type: string } }
            Accept-Ranges: { schema: { type: string } }
            Cache-Control: { schema: { type: string } }
          content:
            audio/wav: { schema: { type: string, format: binary } }
        '206':
          description: Conteúdo parcial (resposta a Range)
          headers:
            Content-Range: { schema: { type: string } }
            ETag: { schema: { type: string } }
            Accept-Ranges: { schema: { type: string } }
          content:
            audio/wav: { schema: { type: string, format: binary } }
        '401': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '416': { $ref: '#/components/responses/Problem' }
  /adverse-events:
    post:
      summary: Registrar evento adverso
      operationId: reportAdverseEvent
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/AdverseEventIn' } } }
      responses:
        '201': { description: Criado, content: { application/json: { schema: { $ref: '#/components/schemas/AdverseEventAccepted' } } } }
        '404': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
  /participants/{id}/contact:
    post:
      summary: Gravar contato do participante (staff) — PII CIFRADA em repouso
      operationId: storeParticipantContact
      description: >
        Grava nome e e-mail do participante CIFRADOS em repouso (AES-256-GCM), separados
        do dado de pesquisa (LGPD). A chave vem do ambiente/cofre e nunca é versionada.
        A resposta é NEUTRA e nunca ecoa a PII. Pré-requisito para a entrega real de OTP
        por e-mail. Somente staff de inscrição (`enroll:write`).
      parameters: [ { $ref: '#/components/parameters/PathId' } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/ContactIn' } } }
      responses:
        '201': { description: Contato gravado (confirmação neutra) }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
  /participants/{id}/data:
    get:
      summary: Exportar os dados do titular (LGPD/acesso) — admin
      operationId: exportSubjectData
      description: >
        Reúne os dados do participante (com a PII decifrada, pois é o próprio dado dele) para
        atender a um pedido de acesso/portabilidade (LGPD). NUNCA inclui o braço/condição
        (cegamento preservado). Somente admin (`user:manage`). Registrado em auditoria.
      parameters: [ { $ref: '#/components/parameters/PathId' } ]
      responses:
        '200': { description: Dados do titular, content: { application/json: { schema: { $ref: '#/components/schemas/SubjectData' } } } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /participants/{id}/erase:
    post:
      summary: Eliminar dados pessoais do titular (LGPD) — admin
      operationId: eraseParticipant
      description: >
        Remove a PII DIRETA (contato cifrado, artefatos de OTP) e marca o participante como
        'withdrawn'. Os dados de pesquisa PSEUDONIMIZADOS são retidos (exceção de pesquisa da
        LGPD; ver ADR-066) e a auditoria append-only NÃO é apagada. Somente admin (`user:manage`).
        Registrado em auditoria.
      parameters: [ { $ref: '#/components/parameters/PathId' } ]
      responses:
        '200': { description: Dados pessoais eliminados, content: { application/json: { schema: { $ref: '#/components/schemas/EraseResult' } } } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /research/participants:
    get:
      summary: Listar participantes (pesquisa) — RBAC, braço codificado
      operationId: researchListParticipants
      parameters:
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/Cursor' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/ResearchPage' } } } }
        '403': { $ref: '#/components/responses/Problem' }
  /screening:
    post:
      summary: Triagem/elegibilidade do participante (staff) — ordena o funil de inscrição
      operationId: recordScreening
      description: >
        Registra a triagem: o servidor calcula a elegibilidade por regra transparente e
        versionada (todas as inclusões verdadeiras E nenhuma exclusão presente) e grava
        critérios + decisão. É pré-condição, junto ao consentimento, para a alocação.
        Somente staff de inscrição (`enroll:write`).
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/ScreeningIn' } } }
      responses:
        '201': { description: Triagem registrada, content: { application/json: { schema: { $ref: '#/components/schemas/ScreeningResult' } } } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
  /allocation:
    post:
      summary: Alocar participante (staff) — resposta NEUTRA, nunca revela o braço
      operationId: allocateParticipant
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/AllocateIn' } } }
      responses:
        '201': { description: Alocado (confirmação neutra), content: { application/json: { schema: { $ref: '#/components/schemas/AllocationAccepted' } } } }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
  /allocation/{id}/unblind-request:
    post:
      summary: Solicitar desbloqueio de um participante (admin) — passo 1 de 2, NÃO revela
      operationId: unblindRequest
      description: >
        Passo 1 do desbloqueio em DUAS PESSOAS: um admin (`unblind:request`) abre um pedido
        justificado. NÃO revela a condição — apenas registra a pendência e audita o pedido
        (`unblind.requested`, sem a condição). A revelação só ocorre no passo 2 (`unblind-approve`),
        exigido a um SEGUNDO admin distinto. 409 se já houver pedido pendente ou já desbloqueado.
      parameters: [ { $ref: '#/components/parameters/PathId' } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/UnblindIn' } } }
      responses:
        '200': { description: Pedido registrado (aguarda 2º aprovador), content: { application/json: { schema: { $ref: '#/components/schemas/UnblindRequestResult' } } } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
  /allocation/{id}/unblind-approve:
    post:
      summary: Aprovar desbloqueio (SEGUNDO admin) — passo 2 de 2, revela a condição
      operationId: unblindApprove
      description: >
        Passo 2 do desbloqueio em duas pessoas: um SEGUNDO admin (`unblind:request`), DISTINTO do
        solicitante, aprova o pedido pendente. Só aqui a condição (ativo/sham) é revelada, usando a
        chave selada; a auditoria registra `unblind.performed` (quem aprovou/quando) SEM a condição
        em claro. 409 se não houver pedido pendente, se o aprovador for o mesmo solicitante, ou se já
        desbloqueado. É o ÚNICO caminho da API para a condição.
      parameters: [ { $ref: '#/components/parameters/PathId' } ]
      responses:
        '200': { description: Condição revelada (ao 2º admin), content: { application/json: { schema: { $ref: '#/components/schemas/UnblindResult' } } } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /research/export:
    post:
      summary: Solicitar exportação pseudonimizada (assíncrona) — RBAC
      operationId: requestExport
      description: >
        Solicita a exportação pseudonimizada (casos completos): sem PII e SEM a condição
        (ativo/sham) — só o braço CODIFICADO A/B, para a análise cega. Registrada em auditoria.
      responses:
        '202': { description: Aceito (processamento assíncrono), content: { application/json: { schema: { $ref: '#/components/schemas/JobAccepted' } } } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
  /research/export/{id}:
    get:
      summary: Status/arquivo da exportação (RBAC)
      operationId: getExport
      parameters: [ { $ref: '#/components/parameters/PathId' } ]
      responses:
        '200':
          description: Concluída (CSV) ou status do job (JSON)
          content:
            text/csv: { schema: { type: string } }
            application/json: { schema: { $ref: '#/components/schemas/JobStatus' } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /research/audit:
    get:
      summary: Ler o log de auditoria (admin) — append-only, sem PII nem braço
      operationId: readAuditLog
      description: >
        Lista eventos de auditoria de ações sensíveis (consentimento, alocação e, quando
        implementados, pedido de exportação e desbloqueio). Somente admin (`audit:read`).
        Paginação por cursor keyset (mais recentes primeiro). O log é append-only e nunca
        contém PII em claro nem o braço (ativo/sham).
      parameters:
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/Cursor' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/AuditPage' } } } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
  /research/analysis:
    get:
      summary: Relatório de análise do piloto (viabilidade, Bang, exploratórios, progressão)
      operationId: getAnalysis
      description: >
        Relatório REPRODUZÍVEL e CEGO (por braço CODIFICADO A/B) — viabilidade/adesão/retenção,
        usabilidade (SUS), índice de Bang (cegamento), testes exploratórios (GAD-7/PSQI) e
        critérios de progressão pré-especificados (semáforo). Exploratório/gerador de hipóteses;
        NÃO decide eficácia nem desfecho ao vivo. RBAC `research:read`.
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/AnalysisReport' } } } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
  /staff:
    post:
      summary: Criar usuário de staff (admin) — sem auto-registro público
      operationId: createStaff
      description: Cria pesquisador/admin. Somente admin (`user:manage`); a senha é cifrada (argon2id).
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/StaffCreateIn' } } }
      responses:
        '201': { description: Criado, content: { application/json: { schema: { $ref: '#/components/schemas/StaffCreated' } } } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
  /staff/me/mfa/enroll:
    post:
      summary: Iniciar cadastro de MFA (TOTP) — gera segredo e URI otpauth
      operationId: enrollMfa
      description: >
        Gera e guarda um segredo TOTP para o staff autenticado e devolve o `provisioning_uri`
        (QR). O MFA só é ATIVADO após confirmar um código válido (`/staff/me/mfa/confirm`).
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/MfaEnrollOut' } } } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
  /staff/me/mfa/confirm:
    post:
      summary: Confirmar e ATIVAR o MFA com um código TOTP
      operationId: confirmMfa
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/MfaConfirmIn' } } }
      responses:
        '200': { description: MFA ativado, content: { application/json: { schema: { $ref: '#/components/schemas/MfaConfirmed' } } } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
  parameters:
    PathId: { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    Limit: { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
    Cursor: { name: cursor, in: query, required: false, schema: { type: string } }
    IdempotencyKey: { name: Idempotency-Key, in: header, required: false, schema: { type: string } }
  responses:
    Problem:
      description: Erro (application/problem+json, RFC 9457)
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
  schemas:
    Problem:
      type: object
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
      required: [title, status]
    FollowupIn:
      type: object
      properties:
        gad7_items: { type: array, items: { type: integer, minimum: 0, maximum: 3 }, minItems: 7, maxItems: 7 }
        psqi: { $ref: '#/components/schemas/PSQIIn' }
        sus_items: { type: array, items: { type: integer, minimum: 1, maximum: 5 }, minItems: 10, maxItems: 10 }
        blinding_guess: { type: string, enum: [A, B, nao_sei] }
      required: [gad7_items, psqi, sus_items, blinding_guess]
    FollowupOut:
      type: object
      properties:
        gad7_total: { type: integer }
        gad7_severity: { type: string }
        psqi_global: { type: integer }
        psqi_interpretation: { type: string }
        sus_score: { type: number }
        sus_band: { type: string }
        blinding_guess: { type: string }
        score_version: { type: string }
    RequestOtpIn:
      type: object
      properties: { study_code: { type: string } }
      required: [study_code]
    VerifyOtpIn:
      type: object
      properties:
        study_code: { type: string }
        code: { type: string, pattern: '^[0-9]{6}$' }
      required: [study_code, code]
    RecommendationRequest:
      type: object
      description: Contexto AUTORRELATADO. Sinais de segurança são derivados no servidor, não aqui.
      properties:
        goal: { type: string, enum: [sleep, anxiety] }
        sleep_issue: { type: [string, "null"], enum: [onset, maintenance, null] }
        time_of_day: { type: string, enum: [day, evening, night], default: evening }
      required: [goal]
    Recommendation:
      type: object
      description: >
        Handle de protocolo NEUTRO (nunca revela o braço). `suggested_protocol`/`band` são null
        quando `action` = no_recommendation (guardrail de contraindicação). Sempre acompanha aviso
        de ferramenta complementar e nota de evidência.
      properties:
        id: { type: string, format: uuid }
        action: { type: string, enum: [recommend, no_recommendation] }
        suggested_protocol: { type: [string, "null"] }
        band: { type: [string, "null"] }
        rule_id: { type: string }
        ruleset_version: { type: string }
        flag_review: { type: boolean }
        rationale: { type: string }
        evidence_note: { type: string }
        disclaimer: { type: string }
      required: [id, action, rule_id, ruleset_version, flag_review]
    AcceptRecommendationIn:
      type: object
      properties: { accepted: { type: boolean } }
      required: [accepted]
    AcceptRecommendationOut:
      type: object
      properties:
        id: { type: string, format: uuid }
        accepted: { type: boolean }
      required: [id, accepted]
    RecommendationCoherence:
      type: object
      description: >
        Relatório exploratório e CEGO (sem braço). `n`=0 quando não há recomendações efetivas.
        Médias de relaxamento são null até existir vínculo recomendação→sessão.
      properties:
        n: { type: integer }
        goal_alignment_rate: { type: [number, "null"] }
        acceptance_rate: { type: [number, "null"] }
        mean_relaxation_accepted: { type: [number, "null"] }
        mean_relaxation_rejected: { type: [number, "null"] }
      required: [n]
    DiaryIn:
      type: object
      properties:
        diary_date: { type: string, format: date }
        latency_min: { type: [integer, "null"], minimum: 0, maximum: 1440 }
        awakenings: { type: [integer, "null"], minimum: 0, maximum: 50 }
        duration_h: { type: [number, "null"], minimum: 0, maximum: 24 }
        quality: { type: [integer, "null"], minimum: 0, maximum: 4 }
      required: [diary_date]
    LoginIn:
      type: object
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
      required: [email, password]
    RefreshIn:
      type: object
      properties: { refresh_token: { type: string } }
      required: [refresh_token]
    LogoutIn:
      type: object
      description: "refresh_token opcional — se enviado, também é revogado."
      properties: { refresh_token: { type: [string, "null"] } }
    MfaIn:
      type: object
      properties:
        mfa_token: { type: string }
        code: { type: string, pattern: '^[0-9]{6}$' }
      required: [mfa_token, code]
    TokenResponse:
      type: object
      description: >
        Resposta do login/refresh/verify. Três desfechos possíveis para staff:
        (1) MFA ativo → `mfa_required: true` + `mfa_token` (troque por acesso em /auth/mfa/verify);
        (2) MFA ainda NÃO ativo → `mfa_enrollment_required: true` + `enrollment_token`
        (token de graça, SEM escopo: só habilita /staff/me/mfa/enroll e /confirm — MFA é
        obrigatório para staff); (3) fluxo já autenticado → `access_token`+`refresh_token`.
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, enum: [bearer] }
        expires_in: { type: integer }
        mfa_required: { type: boolean }
        mfa_token: { type: string, description: "Desafio intermediário quando o MFA está ativo." }
        mfa_enrollment_required: { type: boolean, description: "Staff sem 2º fator: precisa cadastrar MFA." }
        enrollment_token: { type: string, description: "Token restrito ao cadastro de MFA (sem escopo)." }
      required: [token_type]
    ConsentIn:
      type: object
      properties:
        tcle_version: { type: string }
        accepted: { type: boolean }
      required: [tcle_version, accepted]
    ConsentOut:
      type: object
      properties:
        id: { type: string, format: uuid }
        accepted_at: { type: string, format: date-time }
        content_hash: { type: string }
    PSQIIn:
      type: object
      properties:
        subjective_quality: { type: integer, minimum: 0, maximum: 3 }
        latency_min: { type: integer, minimum: 0, maximum: 1440 }
        cannot_sleep_30min_freq: { type: integer, minimum: 0, maximum: 3 }
        hours_slept: { type: number, exclusiveMinimum: 0, maximum: 24 }
        hours_in_bed: { type: number, exclusiveMinimum: 0, maximum: 24, description: "derivado no cliente (deitar→levantar)" }
        disturbance_items:
          type: array
          items: { type: integer, minimum: 0, maximum: 3 }
          minItems: 9
          maxItems: 9
        medication_freq: { type: integer, minimum: 0, maximum: 3 }
        stay_awake_freq: { type: integer, minimum: 0, maximum: 3 }
        enthusiasm_problem: { type: integer, minimum: 0, maximum: 3 }
      required: [subjective_quality, latency_min, cannot_sleep_30min_freq, hours_slept, hours_in_bed, disturbance_items, medication_freq, stay_awake_freq, enthusiasm_problem]
    BaselineIn:
      type: object
      properties:
        gad7_items:
          type: array
          items: { type: integer, minimum: 0, maximum: 3 }
          minItems: 7
          maxItems: 7
        psqi: { $ref: '#/components/schemas/PSQIIn' }
      required: [gad7_items, psqi]
    ScoreOut:
      type: object
      properties:
        gad7_total: { type: integer }
        gad7_severity: { type: string }
        psqi_global: { type: integer }
        psqi_interpretation: { type: string }
        score_version: { type: string }
    SessionIn:
      type: object
      properties:
        protocol_handle: { type: string, description: "handle neutro — não revela o braço" }
        headphones_ok: { type: boolean }
        device_info: { type: object, additionalProperties: true }
        recommendation_id:
          type: [string, "null"]
          format: uuid
          description: "recomendação que originou a sessão (opcional; vincula p/ o relatório de coerência)"
      required: [protocol_handle, headphones_ok]
    SessionOut:
      type: object
      properties:
        session_id: { type: string, format: uuid }
        protocol_handle: { type: string, description: "banda neutra — idêntica nos dois braços" }
        content_hash: { type: string, description: "opaco; o cliente reproduz o arquivo bit-a-bit" }
        started_at: { type: string, format: date-time }
    SessionCompleteIn:
      type: object
      properties:
        effective_seconds: { type: integer, minimum: 0, maximum: 86400 }
        interruptions: { type: integer, minimum: 0 }
      required: [effective_seconds]
    SurveyIn:
      type: object
      properties:
        feeling: { type: integer, minimum: 0, maximum: 4 }
        relaxation: { type: integer, minimum: 0, maximum: 4 }
        slept_better: { type: [integer, "null"], minimum: 0, maximum: 4 }
        liked: { type: integer, minimum: 0, maximum: 4 }
        intensity: { type: integer, minimum: 0, maximum: 4 }
        would_repeat: { type: boolean }
      required: [feeling, relaxation, liked, intensity, would_repeat]
    AdverseEventAccepted:
      type: object
      description: "Confirmação com sinalização de atenção e orientação de cuidado."
      properties:
        status: { type: string, enum: [recorded] }
        requires_attention: { type: boolean }
        guidance: { type: string }
      required: [status, requires_attention, guidance]
    AdverseEventIn:
      type: object
      properties:
        type: { type: string }
        severity: { type: string, enum: [mild, moderate, severe] }
        session_id: { type: [string, "null"], format: uuid }
        action: { type: [string, "null"] }
      required: [type, severity]
    SessionPage:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/SessionOut' } }
        next_cursor: { type: [string, "null"] }
      required: [items]
    ResearchParticipant:
      type: object
      properties:
        study_code: { type: string }
        arm_coded: { type: string, enum: [A, B] }
        adherence_pct: { type: number }
        adverse_events: { type: integer }
    ResearchPage:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/ResearchParticipant' } }
        next_cursor: { type: [string, "null"] }
      required: [items]
    AuditEvent:
      type: object
      description: "Evento de auditoria — append-only, SEM PII e SEM o braço (ativo/sham)."
      properties:
        id: { type: string, format: uuid }
        action: { type: string, examples: [consent.recorded, allocation.created] }
        resource_type: { type: string }
        resource_id: { type: [string, "null"], format: uuid }
        actor_type: { type: string, enum: [participant, staff, system] }
        actor_id: { type: [string, "null"], format: uuid }
        occurred_at: { type: string, format: date-time }
        meta: { type: [object, "null"], additionalProperties: true }
      required: [id, action, resource_type, actor_type, occurred_at]
    AuditPage:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/AuditEvent' } }
        next_cursor: { type: [string, "null"] }
      required: [items]
    AllocateIn:
      type: object
      properties:
        participant_id: { type: string, format: uuid }
      required: [participant_id]
    ContactIn:
      type: object
      description: "PII do participante — cifrada em repouso no servidor; nunca ecoada de volta."
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        email: { type: string, format: email, minLength: 3, maxLength: 254 }
      required: [name, email]
    ScreeningIn:
      type: object
      description: >
        Critérios estruturados. Elegível ⇔ todas as inclusões verdadeiras E nenhuma exclusão
        presente. As chaves concretas vêm do protocolo aprovado (CEP); o servidor só aplica a regra.
      properties:
        participant_id: { type: string, format: uuid }
        inclusion: { type: object, additionalProperties: { type: boolean } }
        exclusion: { type: object, additionalProperties: { type: boolean } }
        symptoms: { type: [object, "null"], additionalProperties: true }
      required: [participant_id, inclusion, exclusion]
    ScreeningResult:
      type: object
      properties:
        status: { type: string, enum: [screened] }
        eligible: { type: boolean }
      required: [status, eligible]
    EraseResult:
      type: object
      properties:
        status: { type: string, enum: [erased] }
        removed: { type: object, additionalProperties: { type: integer } }
      required: [status, removed]
    SubjectData:
      type: object
      description: "Dados do titular (com PII do próprio). NUNCA contém o braço/condição."
      additionalProperties: true
      properties:
        profile: { type: object, additionalProperties: true }
        contact: { type: [object, "null"], additionalProperties: true }
    StaffCreateIn:
      type: object
      properties:
        email: { type: string, format: email, minLength: 3, maxLength: 120 }
        role: { type: string, enum: [researcher, admin] }
        password: { type: string, minLength: 8, maxLength: 200 }
      required: [email, role, password]
    StaffCreated:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string }
        role: { type: string, enum: [researcher, admin] }
      required: [id, email, role]
    MfaEnrollOut:
      type: object
      description: "provisioning_uri (otpauth://) para o app autenticador; secret para entrada manual."
      properties:
        provisioning_uri: { type: string }
        secret: { type: string }
      required: [provisioning_uri, secret]
    MfaConfirmIn:
      type: object
      properties: { code: { type: string, pattern: '^[0-9]{6}$' } }
      required: [code]
    MfaConfirmed:
      type: object
      properties: { mfa_enabled: { type: boolean, enum: [true] } }
      required: [mfa_enabled]
    AllocationAccepted:
      type: object
      description: "Confirmação neutra — deliberadamente SEM o braço (ocultação da alocação)."
      properties:
        status: { type: string, enum: [allocated] }
        block: { type: integer }
      required: [status, block]
    UnblindIn:
      type: object
      description: "Justificativa obrigatória do desbloqueio (auditada; nunca contém a condição)."
      properties:
        justification: { type: string, minLength: 10, maxLength: 500 }
      required: [justification]
    UnblindRequestResult:
      type: object
      description: "Passo 1: pedido registrado; NÃO contém a condição (aguarda 2º aprovador)."
      properties:
        participant_id: { type: string, format: uuid }
        status: { type: string, enum: [pending_approval] }
        requested_at: { type: string, format: date-time }
      required: [participant_id, status, requested_at]
    UnblindResult:
      type: object
      description: "Passo 2: condição revelada ao 2º admin — ÚNICO ponto onde a condição aparece na API."
      properties:
        participant_id: { type: string, format: uuid }
        condition: { type: string, enum: [active, sham] }
        unblinded_at: { type: string, format: date-time }
        justification: { type: string }
      required: [participant_id, condition, unblinded_at]
    JobAccepted:
      type: object
      properties:
        job_id: { type: string, format: uuid }
        status: { type: string, enum: [queued, running, done, failed] }
      required: [job_id, status]
    JobStatus:
      type: object
      properties:
        job_id: { type: string, format: uuid }
        status: { type: string, enum: [queued, running, done, failed] }
      required: [job_id, status]
    AnalysisReport:
      type: object
      description: >
        Relatório cego por braço codificado (A/B). Estrutura aberta (seções descritivas);
        nunca contém a condição ativo/sham nem PII.
      additionalProperties: true
      properties:
        framing: { type: string }
        enrollment: { type: object, additionalProperties: true }
        feasibility: { type: object, additionalProperties: true }
        blinding: { type: object, additionalProperties: true }
        exploratory: { type: object, additionalProperties: true }
        progression: { type: object, additionalProperties: true }
