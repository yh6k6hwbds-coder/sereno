name: CI
on: [push, pull_request]
jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r backend/requirements.txt
      - name: Lint
        run: ruff check backend || true
      - name: Migração (SQLite) — smoke test do Alembic
        run: cd backend && DATABASE_URL=sqlite:///./ci.db alembic upgrade head
      - name: Testes do backend + cobertura mínima (bloqueiam merge)
        run: cd backend && pytest -q --cov=app --cov-report=term-missing --cov-fail-under=80
  backend-postgres:              # D3: valida a migração no Postgres REAL (JSONB/INET/CHECK que o SQLite ignora)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_USER: sereno, POSTGRES_PASSWORD: sereno, POSTGRES_DB: sereno }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U sereno" --health-interval 5s --health-timeout 3s --health-retries 12
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r backend/requirements.txt
      - name: Migração no Postgres real (alembic upgrade head)
        run: cd backend && alembic upgrade head
        env:
          DATABASE_URL: postgresql+psycopg://sereno:sereno@localhost:5432/sereno
  audio-fft:                     # decisão inegociável: o estímulo é validado por FFT
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install numpy scipy pytest      # sem matplotlib: o gate FFT não depende de plotagem
      - name: Bateria de validação de sinal (FFT) — falha o job se algum protocolo reprovar
        run: cd audio-pipeline && python binaural_instrument.py --no-plot
      - name: Testes do pipeline de áudio
        run: cd audio-pipeline && python -m pytest tests/ -q
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install openapi-spec-validator pyyaml
      - name: Validar contrato OpenAPI
        run: python -c "import yaml,openapi_spec_validator as v; v.validate(yaml.safe_load(open('shared-contracts/openapi.yaml'))); print('OpenAPI ok')"
      - name: TCLE do app em sincronia com o rascunho que vai ao CEP
        run: python scripts/sync_tcle.py --check
  app:                           # BLOQUEANTE: flutter test trava em erro de compilação/teste.
    runs-on: ubuntu-latest        # analyze bloqueia só em ERROS (lint/estilo é informativo,
    steps:                        # para limpeza incremental sem travar o merge).
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
      - run: cd app && flutter pub get
      - name: Análise estática (Flutter) — bloqueia só em erros
        run: cd app && flutter analyze --no-fatal-warnings --no-fatal-infos
      - name: Testes de widget (Flutter) — bloqueiam merge
        run: cd app && flutter test
