# fly.toml — deploy do backend do Sereno na Fly.io.
# Região gru (São Paulo) para honrar a residência de dados no Brasil (decisão
# inegociável #6 do CLAUDE.md; ver docs/decisoes/ADR-076-deploy-fly-residencia.md).
#
# Passo a passo em docs/deploy-fly.md. Resumo:
#   fly apps create sereno-piloto-api
#   fly postgres create --name sereno-piloto-db --region gru
#   fly postgres attach sereno-piloto-db            # injeta DATABASE_URL
#   fly secrets set JWT_SECRET=... PII_ENC_KEY=... ALLOCATION_SEED=...
#   fly secrets set ARM_CONDITION_MAP="A:sham,B:active"   # CHAVE SELADA — sorteio custodiado,
#                                                         # NUNCA versionada (ver ADR-077)
#   fly secrets set SMTP_HOST=... SMTP_USER=... SMTP_PASSWORD=... SMTP_FROM=...  # OTP real
#   fly deploy
#
# Se mudar o nome do app aqui, atualize a variável API_BASE_URL no GitHub
# (Settings > Secrets and variables > Actions > Variables) para <novo>/v1.

app = "sereno-piloto-api"
primary_region = "gru"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  # Apenas NÃO-segredos. Segredos (JWT_SECRET, PII_ENC_KEY, ALLOCATION_SEED, DATABASE_URL,
  # ARM_CONDITION_MAP, SMTP_*) vão por `fly secrets set` / `fly postgres attach` — nunca aqui.
  #
  # Produção: liga o guard de startup (app/core/config.py). Recusa subir se a chave selada
  # A/B→condição cair no default público (inegociável #2) ou se EMAIL_DEV_CONSOLE estiver
  # ligado (OTP em log, inegociável #6). Ver ADR-077.
  APP_ENV = "production"
  # Origem do app web no GitHub Pages (sem barra final). Ajuste se o repo mudar.
  CORS_ORIGINS = "https://yh6k6hwbds-coder.github.io"
  # IP real do cliente atrás da borda da Fly. A Fly injeta e SOBRESCREVE Fly-Client-IP
  # (à prova de spoof); sem isto o rate limit por IP viraria um bucket global da borda
  # (ADR-064/ADR-078). Se trocar de plataforma, use TRUSTED_PROXY_HOPS no lugar.
  CLIENT_IP_HEADER = "Fly-Client-IP"
  #
  # ATENÇÃO — a chave selada NÃO fica aqui. Configure-a como secret com um sorteio
  # custodiado (ex.: `fly secrets set ARM_CONDITION_MAP="A:sham,B:active"`), conhecido só
  # pelo custodiante e aberto no data lock. Enquanto não estiver setada, o deploy recusa subir.
  #
  # OTP real: configure SMTP_* como secrets. Sem SMTP em produção, o OTP não é entregue
  # (NullEmailSender — não vaza o código, mas o participante não recebe). NÃO use
  # EMAIL_DEV_CONSOLE em produção (o guard recusa).

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1        # evita cold-start no piloto; baixe p/ 0 se quiser economizar

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    timeout = "3s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"                # scipy/numpy no import do módulo de análise pedem folga
